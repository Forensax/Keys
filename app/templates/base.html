<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}{{ app_name }}{% endblock %}</title>
    <link rel="icon" type="image/png" href="{{ url_for('static', path='/site-logo.png') }}?v=20260714-redesign">
    <link rel="stylesheet" href="{{ url_for('static', path='/styles.css') }}?v=20260714-redesign">
  </head>
  <body>
    <header class="topbar">
      <a class="brand" href="/">
        <img class="brand-logo" src="{{ url_for('static', path='/site-logo.png') }}?v=20260714-redesign" alt="" width="24" height="24" aria-hidden="true">
        <span class="brand-name">{{ app_name }}</span>
      </a>
      {% if authenticated %}
        <nav class="nav">
          <a href="/">首页</a>
          <a href="/providers/new">新增</a>
          <a href="/schedules">定时</a>
          <a href="/monitoring">监控</a>
          <a href="/notification-channels">通知</a>
          <a href="/statistics">统计</a>
          <a href="/proxies">代理</a>
          <a href="/archive">归档</a>
          <a href="/import-export">备份</a>
          <form method="post" action="/logout">
            <button class="link-button" type="submit">登出</button>
          </form>
        </nav>
      {% endif %}
    </header>

    <main class="page">
      {% if flash %}
        <div class="flash {{ flash.level }}">{{ flash.message }}</div>
      {% endif %}
      {% block content %}{% endblock %}
    </main>
    <div class="copy-toast" data-copy-toast aria-live="polite"></div>
    <div class="response-tooltip" data-response-tooltip-popup role="tooltip" hidden></div>
    <script src="{{ url_for('static', path='/app.js') }}?v=20260714-redesign"></script>
  </body>
</html>
