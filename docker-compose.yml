services:
  keys:
    build:
      context: .
      dockerfile: Dockerfile
    init: true
    restart: unless-stopped
    ports:
      - "${DOCKER_BIND_ADDRESS:-0.0.0.0}:${PORT:-18000}:18000"
    environment:
      APP_NAME: "${APP_NAME:-中转站管理}"
      DATABASE_URL: "sqlite:////app/data/keys.db"
      SESSION_SECRET: "${SESSION_SECRET:?请在 .env 中设置 SESSION_SECRET}"
      COOKIE_SECURE: "${COOKIE_SECURE:-false}"
      REQUEST_TIMEOUT_SECONDS: "${REQUEST_TIMEOUT_SECONDS:-30}"
    volumes:
      - ./data:/app/data
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:18000/health', timeout=5)"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
