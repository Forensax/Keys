services:
  keys:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        PIP_INDEX_URL: "${DOCKER_PIP_INDEX_URL:-https://mirrors.aliyun.com/pypi/simple/}"
    init: true
    restart: unless-stopped
    ports:
      - "${DOCKER_BIND_ADDRESS:-0.0.0.0}:${PORT:-18000}:18000"
    environment:
      APP_NAME: "${APP_NAME:-中转站管理}"
      DATABASE_URL: "sqlite:////app/data/keys.db"
      SESSION_SECRET: "${SESSION_SECRET:?请在 .env 中设置 SESSION_SECRET}"
      APP_TIMEZONE: "${APP_TIMEZONE:-Asia/Shanghai}"
      COOKIE_SECURE: "${COOKIE_SECURE:-false}"
      REQUEST_TIMEOUT_SECONDS: "${REQUEST_TIMEOUT_SECONDS:-30}"
      PROXY_TEST_URL: "${PROXY_TEST_URL:-https://api.ipify.org?format=json}"
    volumes:
      - ./data:/app/data
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:18000/health', timeout=5)"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
